server.port: 7105
debug: true

spring:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    name: openweather
    url: jdbc:h2:~/openweather

resttemplate.conn.timeout: 15000
resttemplate.read.timeout: 15000

logging.level:
  root: INFO
